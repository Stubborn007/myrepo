<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Page</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 class="fade-in">My Animated Website</h1>
    <p class="fade-in delay">Welcome with smooth animation</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <div class="card slide-up">
        <h2>Card 1</h2>
        <p>This card slides up when page loads.</p>
        <button class="btn">Click Me</button>
    </div>

    <div class="card slide-up delay">
        <h2>Card 2</h2>
        <p>Hover over this card for animation.</p>
        <button class="btn">Click Me</button>
    </div>
</div>

<footer>
    <p>© 2026 Animated Website</p>
</footer>

</body>
</html>
